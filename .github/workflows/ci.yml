name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build e testes (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [8, 17]
      fail-fast: false
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Rodar mvn clean test
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: target/surefire-reports/
          if-no-files-found: ignore
